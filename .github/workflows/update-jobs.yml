# ============================================================
# 每周自动更新招聘数据
#   每周一 UTC 0:00（北京时间 8:00）自动运行
#   也支持在 GitHub Actions 页面手动触发
# ============================================================
name: Update Jobs Weekly

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 安装 Chrome 浏览器（替代 puppeteer 自己下载，更快更稳）
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 跳过 Chromium 下载，使用上面安装的系统 Chrome
      - name: Install npm dependencies
        working-directory: scripts
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Run scraper
        working-directory: scripts
        run: node fetch-jobs.js
        timeout-minutes: 5
        env:
          CHROME_PATH: /usr/bin/google-chrome

      - name: Commit & push updated jobs.json
        run: |
          if ! git diff --quiet jobs.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add jobs.json
            git commit -m "📋 jobs: weekly update [skip ci]"
            git push
            echo "✅ jobs.json 已更新并推送"
          else
            echo "📭 jobs.json 无变化，跳过提交"
          fi
