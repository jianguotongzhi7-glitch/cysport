# ============================================================
# 每周自动更新招聘数据
#   每周一 UTC 0:00（北京时间 8:00）自动运行
#   也支持在 GitHub Actions 页面手动触发
# ============================================================
name: Update Jobs Weekly

on:
  schedule:
    # 每周一 UTC 0:00 = 北京时间周一 8:00
    # 频率够低，不会触发反爬封禁
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 \
            libatk1.0-0 libcups2 libdbus-1-3 libgbm1 libgtk-3-0 \
            libnspr4 libnss3 libu2f-udev libx11-xcb1 libxcomposite1 \
            libxdamage1 libxrandr2 xdg-utils

      - name: Install npm dependencies
        working-directory: scripts
        run: npm install

      - name: Run scraper
        working-directory: scripts
        run: node fetch-jobs.js
        timeout-minutes: 5

      - name: Commit & push updated jobs.json
        run: |
          if git diff --quiet jobs.json; then
            echo "jobs.json unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add jobs.json
            git commit -m "📋 jobs: weekly update [skip ci]"
            git push
            echo "✅ jobs.json updated & pushed."
          fi
